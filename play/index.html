<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Via Romana | Spielfeld</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="apple-touch-icon" href="../assets/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:  #C9A84C;
            --gold2: #e8c96a;
            --red:   #8B1A1A;
            --dark:  #0d0700;
            --panel: #160b00;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cinzel', serif;
            background: var(--dark);
            color: var(--gold);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Particle canvas ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            position: relative;
            z-index: 10;
            background: rgba(13,7,0,.95);
            border-bottom: 2px solid rgba(201,168,76,.35);
            padding: .7rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar a {
            color: var(--gold);
            text-decoration: none;
            font-size: .75rem;
            letter-spacing: .15em;
            transition: color .2s;
        }
        .top-bar a:hover { color: var(--gold2); }
        .top-bar .tagline { font-size: .7rem; letter-spacing: .12em; color: rgba(201,168,76,.45); }

        /* ── Main layout ── */
        .main {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 1rem 3rem;
        }
        @media (min-width: 960px) {
            .main {
                display: grid;
                grid-template-columns: minmax(0, 1fr) 280px;
                align-items: start;
                justify-content: center;
                gap: 2rem;
                padding: 2rem 1.5rem 3rem;
                max-width: 1460px;
                margin: 0 auto;
            }
        }

        /* ── Page title ── */
        .page-title {
            text-align: center;
            width: 100%;
        }
        @media (min-width: 960px) {
            .page-title { grid-column: 1 / -1; }
        }
        .page-title h1 {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            letter-spacing: .25em;
            text-shadow: 0 0 30px rgba(201,168,76,.5);
        }
        .page-title p {
            font-size: .65rem;
            letter-spacing: .18em;
            color: rgba(201,168,76,.45);
            margin-top: .3rem;
        }

        /* ═══════════════════════════════════════
           BOARD
        ═══════════════════════════════════════ */
        .board-section { flex: 1 1 auto; min-width: 0; width: 100%; max-width: 1140px; }

        .board-outer {
            background: #160c03;
            border: 2px solid rgba(201,168,76,.3);
            border-radius: 8px;
            box-shadow:
                0 0 80px rgba(201,168,76,.07),
                0 20px 60px rgba(0,0,0,.6),
                inset 0 0 60px rgba(0,0,0,.5);
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
        }
        .board-outer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg, transparent, transparent 20px,
                rgba(201,168,76,.015) 20px, rgba(201,168,76,.015) 21px
            );
            pointer-events: none;
        }

        /* ── Snake rows ── */
        .board-row {
            display: flex;
            gap: 7px;
            margin-bottom: 7px;
        }
        .board-row:last-child { margin-bottom: 0; }
        .board-row.reverse { flex-direction: row-reverse; }

        /* ── Row connector (arrow) ── */
        .row-connector {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 2px 8px;
            font-size: .85rem;
            color: rgba(201,168,76,.35);
            animation: arrowPulse 2s ease-in-out infinite;
        }
        .board-row.reverse + .row-connector { justify-content: flex-start; }
        @keyframes arrowPulse {
            0%,100% { opacity: .35; }
            50%      { opacity: .75; }
        }

        /* ── Individual field ── */
        .field {
            flex: 1 1 0;
            min-width: 0;
            aspect-ratio: 1;
            min-height: 74px;
            border-radius: 5px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: .56rem;
            letter-spacing: .05em;
            text-align: center;
            overflow: hidden;
            transition: transform .25s, box-shadow .25s;
            cursor: default;
        }

        /* plain */
        .field-plain {
            background: rgba(201,168,76,.04);
            border: 1px solid rgba(201,168,76,.18);
        }
        .field-plain:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(201,168,76,.45);
            box-shadow: 0 6px 20px rgba(0,0,0,.5);
        }

        /* event */
        .field-event {
            background: rgba(123,94,167,.14);
            border: 1px solid rgba(160,120,200,.35);
        }
        .field-event:hover {
            transform: translateY(-3px) scale(1.06);
            box-shadow: 0 6px 20px rgba(123,94,167,.3);
        }

        /* start */
        .field-start {
            background: rgba(76,175,80,.15);
            border: 2px solid #4caf50;
            animation: glowGreen 2.5s ease-in-out infinite;
        }
        @keyframes glowGreen {
            0%,100% { box-shadow: 0 0 8px rgba(76,175,80,.3); }
            50%      { box-shadow: 0 0 22px rgba(76,175,80,.7); }
        }

        /* end */
        .field-end {
            background: rgba(201,168,76,.15);
            border: 2px solid var(--gold);
            animation: glowGold 2s ease-in-out infinite;
        }
        @keyframes glowGold {
            0%,100% { box-shadow: 0 0 10px rgba(201,168,76,.4); }
            50%      { box-shadow: 0 0 30px rgba(201,168,76,.85); }
        }

        /* ── Location field (3D flip card) ── */
        .field-loc {
            border: 2px solid rgba(201,168,76,.5);
            background: transparent;
            cursor: pointer;
            perspective: 600px;
        }
        .field-loc:hover { box-shadow: 0 0 28px rgba(201,168,76,.4); }

        .card-inner {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            transition: transform .7s cubic-bezier(.4,0,.2,1);
        }
        .field-loc:hover .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Front: the image */
        .card-front {
            background-size: cover;
            background-position: center;
        }
        .card-front::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%);
        }
        .card-front-label {
            position: relative;
            z-index: 1;
            font-size: .42rem;
            letter-spacing: .08em;
            color: #fff;
            padding: 2px 3px;
            text-shadow: 0 1px 4px rgba(0,0,0,.9);
            text-align: center;
            line-height: 1.3;
        }

        /* Back: gold info */
        .card-back {
            transform: rotateY(180deg);
            background: rgba(10,5,0,.92);
            border: 1px solid rgba(201,168,76,.4);
            justify-content: center;
            padding: 4px;
        }
        .card-back-name {
            font-size: .44rem;
            letter-spacing: .06em;
            color: var(--gold2);
            text-align: center;
            line-height: 1.4;
            font-weight: 700;
        }
        .card-back-desc {
            font-size: .36rem;
            letter-spacing: .03em;
            color: rgba(201,168,76,.65);
            text-align: center;
            margin-top: 3px;
            line-height: 1.4;
        }

        /* ── Field icon / number ── */
        .field-icon { font-size: clamp(.8rem,2.5vw,1.2rem); line-height: 1; }
        .field-num  { font-size: .55rem; color: rgba(201,168,76,.25); }
        .field-lbl  { font-size: .38rem; letter-spacing: .05em; margin-top: 2px; opacity: .7; }

        /* ── Player token ── */
        .token {
            position: absolute;
            width: 34%;
            height: 34%;
            border-radius: 50%;
            z-index: 20;
            pointer-events: none;
            top: 5%;
            left: 5%;
            transition: opacity .3s;
            box-shadow:
                0 3px 8px rgba(0,0,0,.7),
                inset 0 -3px 5px rgba(0,0,0,.35),
                inset 0 3px 5px rgba(255,255,255,.35);
            animation: tokenBob 2s ease-in-out infinite;
        }
        @keyframes tokenBob {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-20%); }
        }

        /* ── Legend ── */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem .9rem;
            margin-top: .8rem;
            justify-content: center;
            font-size: .62rem;
            letter-spacing: .06em;
        }
        .leg-item { display: flex; align-items: center; gap: .3rem; }
        .leg-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

        /* ═══════════════════════════════════════
           CONTROLS SIDEBAR
        ═══════════════════════════════════════ */
        .controls {
            flex: 0 0 240px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 280px;
        }
        @media (max-width: 959px) { .controls { width: 100%; max-width: 480px; } }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(201,168,76,.25);
            border-radius: 6px;
            padding: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
        }
        .panel-title {
            font-size: .62rem;
            letter-spacing: .18em;
            color: rgba(201,168,76,.5);
            text-align: center;
            margin-bottom: .8rem;
            text-transform: uppercase;
        }

        /* ── 3D Gold Würfel ── */
        .scene {
            width: 100px;
            height: 100px;
            perspective: 1000px;
            position: relative;
            margin: 0 auto 2rem;
            cursor: pointer;
        }
        .scene::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 15px;
            bottom: -30px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            filter: blur(8px);
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx, -22deg)) rotateY(var(--ry, 28deg));
            transition: transform 1.2s cubic-bezier(0.15, 0.85, 0.35, 1.1);
        }
        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12px;
            backface-visibility: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .f-1 { background: linear-gradient(145deg, #f4e5bf, #d5b06f); transform: rotateY(0deg) translateZ(50px); }
        .f-6 { background: linear-gradient(145deg, #d5b06f, #9c733a); transform: rotateY(180deg) translateZ(50px); }
        .f-3 { background: linear-gradient(145deg, #f4e5bf, #d5b06f); transform: rotateY(90deg) translateZ(50px); }
        .f-4 { background: linear-gradient(145deg, #d5b06f, #9c733a); transform: rotateY(-90deg) translateZ(50px); }
        .f-2 { background: linear-gradient(145deg, #f4e5bf, #d5b06f); transform: rotateX(90deg) translateZ(50px); }
        .f-5 { background: linear-gradient(145deg, #d5b06f, #9c733a); transform: rotateX(-90deg) translateZ(50px); }
        .pip {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #1a0d00;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
            align-self: center;
            justify-self: center;
        }
        .h { visibility: hidden; }

        /* ── Roll button ── */
        .btn-roll {
            width: 100%;
            background: linear-gradient(135deg, var(--red) 0%, #6b1212 100%);
            color: #fff;
            border: 2px solid rgba(201,168,76,.4);
            padding: .65rem 1rem;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: .18em;
            font-size: .78rem;
            cursor: pointer;
            transition: all .3s;
            text-transform: uppercase;
            border-radius: 4px;
        }
        .btn-roll:hover:not(:disabled) {
            background: linear-gradient(135deg, #a52222 0%, #8b1a1a 100%);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201,168,76,.25);
        }
        .btn-roll:disabled { opacity: .5; cursor: not-allowed; }

        /* ── Status ── */
        .status-box {
            background: rgba(201,168,76,.06);
            border: 1px solid rgba(201,168,76,.18);
            border-radius: 4px;
            padding: .6rem .8rem;
            font-size: .68rem;
            letter-spacing: .07em;
            color: rgba(201,168,76,.8);
            text-align: center;
            min-height: 2.4rem;
            line-height: 1.5;
        }

        /* ── Player selector ── */
        .players-row {
            display: flex;
            gap: .5rem;
            justify-content: center;
        }
        .player-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s, border-color .2s;
            box-shadow:
                0 3px 8px rgba(0,0,0,.6),
                inset 0 -3px 5px rgba(0,0,0,.3),
                inset 0 3px 5px rgba(255,255,255,.3);
        }
        .player-btn.active {
            border-color: var(--gold);
            transform: scale(1.15);
            box-shadow: 0 0 14px rgba(201,168,76,.5);
        }
        .player-btn:hover:not(.active) { transform: scale(1.08); }

        /* Player colors */
        .pc-0 { background: radial-gradient(circle at 35% 30%, #ff8080, #c0392b); }
        .pc-1 { background: radial-gradient(circle at 35% 30%, #80b0ff, #2355b0); }
        .pc-2 { background: radial-gradient(circle at 35% 30%, #80ff80, #1a8040); }
        .pc-3 { background: radial-gradient(circle at 35% 30%, #f0c060, #b07010); }

        .player-colors-css { display: none; }

        /* ── Score / position display ── */
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .4rem;
        }
        .score-cell {
            background: rgba(201,168,76,.06);
            border: 1px solid rgba(201,168,76,.15);
            border-radius: 3px;
            padding: .4rem .5rem;
            font-size: .6rem;
            letter-spacing: .05em;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .score-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset 0 -1px 3px rgba(0,0,0,.4), inset 0 1px 3px rgba(255,255,255,.3);
        }
        .score-info { display: flex; flex-direction: column; }
        .score-name { color: var(--gold); font-size: .6rem; }
        .score-pos  { color: rgba(201,168,76,.5); font-size: .52rem; }

        @media (max-width: 959px) {
            .board-section { width: 100%; }
            .board-outer { padding: .85rem; }
            .board-row { gap: 5px; margin-bottom: 5px; }
            .field {
                min-height: 48px;
                font-size: .48rem;
            }
        }

        /* ═══════════════════════════════════════
           EVENT CARD MODAL
        ═══════════════════════════════════════ */
        #eventModal {
            position: fixed;
            inset: 0;
            z-index: 200;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,.78);
            backdrop-filter: blur(5px);
            animation: fadeInModal .3s ease;
        }
        @keyframes fadeInModal {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .event-card-scene {
            perspective: 1000px;
            width: 260px;
            height: 380px;
        }
        .event-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform .85s cubic-bezier(.4,0,.2,1);
        }
        .event-card-inner.flipped { transform: rotateY(180deg); }

        .event-card-face {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.4rem;
        }
        .event-card-front {
            background: linear-gradient(145deg, #1e0a3c, #0d051a);
            border: 2px solid rgba(160,120,200,.6);
            box-shadow:
                0 0 50px rgba(123,94,167,.45),
                0 20px 60px rgba(0,0,0,.7);
        }
        .ecfront-icon  { font-size: 4rem; margin-bottom: .9rem; filter: drop-shadow(0 0 12px rgba(160,120,200,.8)); }
        .ecfront-label { font-size: .72rem; letter-spacing: .28em; color: rgba(160,120,200,.9); text-transform: uppercase; }
        .ecfront-sub   { font-size: .52rem; letter-spacing: .18em; color: rgba(160,120,200,.4); margin-top: .4rem; }

        .event-card-back {
            transform: rotateY(180deg);
            background: linear-gradient(160deg, #110900, #0a0500);
            border: 2px solid rgba(201,168,76,.55);
            box-shadow:
                0 0 40px rgba(201,168,76,.22),
                0 20px 60px rgba(0,0,0,.7);
            justify-content: flex-start;
            padding: 1.3rem 1.2rem;
        }
        .ecback-type   {
            font-size: .5rem;
            letter-spacing: .22em;
            color: rgba(160,120,200,.6);
            text-transform: uppercase;
            margin-bottom: .6rem;
            align-self: flex-start;
        }
        .ecback-cardicon { font-size: 2.1rem; margin-bottom: .55rem; }
        .ecback-title  {
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .1em;
            color: var(--gold2);
            margin-bottom: .7rem;
            text-align: center;
            line-height: 1.3;
        }
        .ecback-desc   {
            font-size: .6rem;
            letter-spacing: .05em;
            color: rgba(201,168,76,.7);
            text-align: center;
            line-height: 1.65;
            margin-bottom: .9rem;
            flex: 1;
        }
        .ecback-effect {
            font-size: .66rem;
            letter-spacing: .08em;
            font-weight: 700;
            text-align: center;
            padding: .45rem .9rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            width: 100%;
        }
        .effect-positive { background: rgba(76,175,80,.18); border: 1px solid rgba(76,175,80,.45); color: #80d080; }
        .effect-negative { background: rgba(139,26,26,.22); border: 1px solid rgba(139,26,26,.5);  color: #d08080; }
        .effect-skip     { background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.38); color: var(--gold); }
        .effect-neutral  { background: rgba(201,168,76,.07); border: 1px solid rgba(201,168,76,.2);  color: rgba(201,168,76,.65); }

        .btn-card-close {
            width: 100%;
            background: linear-gradient(135deg, #7b5ea7 0%, #5a3d85 100%);
            color: #fff;
            border: 1px solid rgba(160,120,200,.45);
            padding: .5rem;
            font-family: 'Cinzel', serif;
            font-size: .68rem;
            letter-spacing: .2em;
            cursor: pointer;
            border-radius: 4px;
            transition: background .2s;
            text-transform: uppercase;
        }
        .btn-card-close:hover { background: linear-gradient(135deg, #9070c0 0%, #7b5ea7 100%); }

    </style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<!-- Top bar -->
<div class="top-bar">
    <a href="../" style="display:flex;align-items:center;gap:.45rem;">
        <img src="../assets/logo.svg" alt="Via Romana Logo" style="width:1.05rem;height:1.05rem;">
        <span>← VIA ROMANA</span>
    </a>
    <span style="font-size:.72rem;letter-spacing:.2em;color:rgba(201,168,76,.5);">SPIELFELD</span>
    <div class="tagline" style="display:flex;align-items:center;gap:.6rem;">
        <span>Discendo vincimus</span>
        <button id="langDeBtn" style="font-size:.6rem;border:1px solid rgba(201,168,76,.4);padding:.2rem .4rem;">DE</button>
        <button id="langEnBtn" style="font-size:.6rem;border:1px solid rgba(201,168,76,.4);padding:.2rem .4rem;">EN</button>
    </div>
</div>

<div class="main">

    <!-- Title (full width) -->
    <div class="page-title">
        <h1>VIA ROMANA</h1>
        <p>SPIELFELD DER ANTIKEN WELT</p>
    </div>

    <!-- Board section -->
    <div class="board-section">
        <div class="board-outer" id="boardOuter">
            <!-- rows injected by JS -->
            <div class="board-row" id="row0"></div>
            <div class="row-connector" id="conn01">↓ ↓ ↓</div>
            <div class="board-row reverse" id="row1"></div>
            <div class="row-connector" style="justify-content:flex-start;" id="conn12">↓ ↓ ↓</div>
            <div class="board-row" id="row2"></div>

            <div class="legend">
                <div class="leg-item"><div class="leg-dot" style="background:#4caf50;"></div>Start / Ziel</div>
                <div class="leg-item"><div class="leg-dot" style="background:var(--red);opacity:.7;"></div>Ortsfeld (hover umdrehen!)</div>
                <div class="leg-item"><div class="leg-dot" style="background:#7b5ea7;"></div>Ereignis</div>

function buildBoard() {
    const rows = [
        { el: document.getElementById('row0'), indices: [0,1,2,3,4,5,6,7,8],   reverse: false },
        { el: document.getElementById('row1'), indices: [9,10,11,12,13,14,15,16,17], reverse: true  },
        { el: document.getElementById('row2'), indices: [18,19,20,21,22,23,24,25,26], reverse: false },
    ];

    rows.forEach(({ el, indices }) => {
        // For the reversed row we render in normal DOM order;
        // flex-direction:row-reverse on the container handles visual reversal.
        indices.forEach(i => {
            const f  = FIELDS[i];
            const div = document.createElement('div');
            div.id = 'field-' + i;

            if (f.t === 'loc') {
                div.className = 'field field-loc';
                div.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front"
                             style="background-image:url('${IMG[f.img]}')">
                            <span class="card-front-label">${f.label}</span>
                        </div>
                        <div class="card-face card-back">
                            <div class="card-back-name">${f.label}</div>
                            <div class="card-back-desc">${f.desc}</div>
                        </div>
                    </div>`;
            } else if (f.t === 'start' || f.t === 'end') {
                div.className = 'field field-' + f.t;
                div.innerHTML = `<span class="field-icon">${f.icon}</span><span class="field-lbl">${f.label}</span>`;
            } else if (f.t === 'event') {
                div.className = 'field field-event';
                div.innerHTML = `<span class="field-icon">${f.icon}</span><span class="field-lbl" style="font-size:.32rem;">${f.label}</span>`;
            } else {
                div.className = 'field field-plain';
                div.innerHTML = `<span class="field-num">${f.label}</span>`;
            }
            el.appendChild(div);
        });
    });
}

/* ═══════════════════════════════════════════════
   RENDER TOKENS
═══════════════════════════════════════════════ */
function renderTokens() {
    // Remove old tokens
    document.querySelectorAll('.token').forEach(t => t.remove());

    positions.forEach((pos, pi) => {
        const fieldEl = document.getElementById('field-' + pos);
        if (!fieldEl) return;
        const tok = document.createElement('div');
        tok.className = 'token';
        tok.style.background = `radial-gradient(circle at 35% 30%, ${lighten(PLAYER_COLORS[pi])}, ${PLAYER_COLORS[pi]})`;
        // offset tokens if multiple on same field
        const sameField = positions.slice(0, pi).filter(p => p === pos).length;
        const offsets = ['5%','40%','5%','40%'];
        const topOff  = ['5%','5%','55%','55%'];
        tok.style.left = offsets[sameField];
        tok.style.top  = topOff[sameField];
        fieldEl.appendChild(tok);
    });
}

function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
}

/* ═══════════════════════════════════════════════
   EVENT CARD FUNCTIONS
═══════════════════════════════════════════════ */
function drawEventCard() {
    const card = EVENT_CARDS[Math.floor(Math.random() * EVENT_CARDS.length)];
    pendingCardEffect = card;
    showCardModal(card);
}

function showCardModal(card) {
    const tx    = t();
    const modal = document.getElementById('eventModal');
    const inner = document.getElementById('eventCardInner');

    document.getElementById('ecType').textContent  = tx.cardType;
    document.getElementById('ecIcon').textContent  = card.icon;
    document.getElementById('ecTitle').textContent = currentLang === 'de' ? card.titleDe : card.titleEn;
    document.getElementById('ecDesc').textContent  = currentLang === 'de' ? card.descDe  : card.descEn;
    document.getElementById('ecCloseBtn').textContent = tx.cardClose;

    const effEl = document.getElementById('ecEffect');
    if (card.skip) {
        effEl.textContent = tx.effectSkip;
        effEl.className   = 'ecback-effect effect-skip';
    } else if (card.effect > 0) {
        effEl.textContent = tx.effectForward(card.effect);
        effEl.className   = 'ecback-effect effect-positive';
    } else if (card.effect < 0) {
        effEl.textContent = tx.effectBackward(Math.abs(card.effect));
        effEl.className   = 'ecback-effect effect-negative';
    } else {
        effEl.textContent = tx.effectNone;
        effEl.className   = 'ecback-effect effect-neutral';
    }

    inner.classList.remove('flipped');
    modal.style.display = 'flex';
    // Auto-flip after a short pause so the player sees the face-down card first
    setTimeout(() => inner.classList.add('flipped'), 420);
}

function dismissEventCard() {
    document.getElementById('eventModal').style.display = 'none';
    const card = pendingCardEffect;
    pendingCardEffect = null;
    applyCardEffect(card);
    rolling = false;
    document.getElementById('rollBtn').disabled = false;
}

function applyCardEffect(card) {
    if (!card) return;
    const pi    = activePlayer;
    const tx    = t();
    const color = PLAYER_COLORS[pi];
    const label = PLAYER_LABELS[pi];

    if (card.skip) {
        skippedTurns[pi]++;
    }

    if (card.effect !== 0) {
        const newPos = Math.max(0, Math.min(positions[pi] + card.effect, TOTAL - 1));
        positions[pi] = newPos;
        renderTokens();
        updateScoreDisplay();

        const fieldEl = document.getElementById('field-' + newPos);
        if (fieldEl) {
            fieldEl.style.transition = 'box-shadow .3s';
            fieldEl.style.boxShadow  = '0 0 30px ' + color;
            setTimeout(() => { fieldEl.style.boxShadow = ''; }, 1200);
        }

        const f = FIELDS[newPos];
        const effText = card.effect > 0
            ? tx.effectForward(card.effect)
            : tx.effectBackward(Math.abs(card.effect));
        const target = f.label || ('Feld ' + (newPos + 1));

        if (newPos >= TOTAL - 1) {
            document.getElementById('status').innerHTML = tx.victory(label);
        } else {
            document.getElementById('status').innerHTML = tx.cardMoved(label, color, effText, target);
        }
    } else if (card.skip) {
        document.getElementById('status').innerHTML = tx.skipNotice(label, color);
    }
}

function buildPlayerUI() {

    for (let i = 0; i < NUM_PLAYERS; i++) {

        btn.title = 'Spieler ' + PLAYER_LABELS[i];
        btn.setAttribute('aria-label', 'Spieler ' + PLAYER_LABELS[i]);
        btn.onclick = () => selectPlayer(i);
        row.appendChild(btn);

        // Score cell
        const cell = document.createElement('div');
        cell.className = 'score-cell';
        cell.id = 'score-' + i;
        cell.innerHTML = `
            <div class="score-dot" style="background:radial-gradient(circle at 35% 30%,${lighten(PLAYER_COLORS[i])},${PLAYER_COLORS[i]})"></div>
            <div class="score-info">
                <span class="score-name">Spieler ${PLAYER_LABELS[i]}</span>
                <span class="score-pos" id="spos-${i}">Feld 1</span>
            </div>`;
        grid.appendChild(cell);
    }
    updateScoreDisplay();
}

function selectPlayer(i) {
    activePlayer = i;
    document.querySelectorAll('.player-btn').forEach((b,j) => {
        b.classList.toggle('active', j === i);
    });
}

function updateScoreDisplay() {
    for (let i = 0; i < NUM_PLAYERS; i++) {
        const el = document.getElementById('spos-' + i);
        if (el) {
            const f = FIELDS[positions[i]];
            el.textContent = 'Feld ' + (positions[i] + 1) + (f.label ? ' · ' + f.label : '');
        }
    }
}

═══════════════════════════════════════════════ */
const DICE_ROTATIONS = {
    1: { x: 0,   y: 0 },
    2: { x: -90, y: 0 },
    3: { x: 0,   y: -90 },
    4: { x: 0,   y: 90 },

    6: { x: 0,   y: 180 },
};

let currentY = 28;

function rollDice() {
    if (rolling) return;

    // Check if this player must skip a turn
    if (skippedTurns[activePlayer] > 0) {
        skippedTurns[activePlayer]--;
        document.getElementById('status').innerHTML =
            t().skipNotice(PLAYER_LABELS[activePlayer], PLAYER_COLORS[activePlayer]);
        return;
    }

    rolling = true;
    document.getElementById('rollBtn').disabled = true;

    const result = Math.floor(Math.random() * 6) + 1;
    const diceCube = document.getElementById('diceCube');
    const target = DICE_ROTATIONS[result];
    const spinsX = (Math.floor(Math.random() * 2) + 3) * 360;
    const spinsY = (Math.floor(Math.random() * 2) + 3) * 360;

    currentX = spinsX + target.x;
    currentY = spinsY + target.y;

    diceCube.style.setProperty('--rx', `${currentX}deg`);
    diceCube.style.setProperty('--ry', `${currentY}deg`);

    document.getElementById('status').innerHTML =
        t().rolling;

    setTimeout(() => {
        diceCube.setAttribute('aria-label', `Würfel zeigt ${result}`);

        // Move token
        const oldPos = positions[activePlayer];
        let newPos   = Math.min(oldPos + result, TOTAL - 1);
        positions[activePlayer] = newPos;

        // Highlight field
        const fieldEl = document.getElementById('field-' + newPos);
        if (fieldEl) {
            fieldEl.style.transition = 'box-shadow .3s';
            fieldEl.style.boxShadow  = '0 0 30px ' + PLAYER_COLORS[activePlayer];
            setTimeout(() => { fieldEl.style.boxShadow = ''; }, 1200);
        }

        renderTokens();
        updateScoreDisplay();

        const f = FIELDS[newPos];
        if (newPos >= TOTAL - 1) {
            document.getElementById('status').innerHTML = t().victory(PLAYER_LABELS[activePlayer]);
            rolling = false;
            document.getElementById('rollBtn').disabled = false;
        } else if (f.t === 'event') {
            document.getElementById('status').innerHTML =
                t().rolled(activePlayer, result, f.label || ('Feld ' + (newPos + 1)));
            // Keep rolling=true and button disabled until card is dismissed
            drawEventCard();
        } else {
            document.getElementById('status').innerHTML =
                t().rolled(activePlayer, result, f.label || ('Feld ' + (newPos + 1)));
            rolling = false;
            document.getElementById('rollBtn').disabled = false;
        }
    }, 1250);
}

// Click on dice = roll
document.getElementById('diceScene').addEventListener('click', rollDice);
document.addEventListener('keydown', e => {
    if ((e.key === ' ' || e.key === 'Enter') && !rolling) rollDice();
});

/* ═══════════════════════════════════════════════
   PARTICLE BACKGROUND
═══════════════════════════════════════════════ */
(function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const DOTS = 70;
    const dots = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < DOTS; i++) {
        dots.push({
            x:  Math.random() * W,
            y:  Math.random() * H,
            r:  Math.random() * 1.4 + .4,
            vx: (Math.random() - .5) * .3,
            vy: (Math.random() - .5) * .3,
            a:  Math.random(),
            da: (Math.random() * .008 + .003) * (Math.random() < .5 ? 1 : -1),
        });
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        dots.forEach(d => {
            d.x  = (d.x + d.vx + W) % W;
            d.y  = (d.y + d.vy + H) % H;
            d.a += d.da;
            if (d.a > 1 || d.a < 0) d.da *= -1;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201,168,76,${d.a * .65})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

function applyPlayLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('viaromana_lang', lang);
    document.documentElement.lang = lang;

    const tx = t();
    const topCenter = document.querySelector('.top-bar > span');
    if (topCenter) topCenter.textContent = tx.top;
    const subtitle = document.querySelector('.page-title p');
    if (subtitle) subtitle.textContent = tx.subtitle;

    const panelTitles = document.querySelectorAll('.panel-title');
    if (panelTitles[0]) panelTitles[0].textContent = tx.dice;
    if (panelTitles[1]) panelTitles[1].textContent = tx.players;
    if (panelTitles[2]) panelTitles[2].textContent = tx.positions;

    const rollBtn = document.getElementById('rollBtn');
    if (rollBtn) rollBtn.textContent = tx.rollBtn;
    const status = document.getElementById('status');
    if (status && !rolling) status.textContent = tx.choose;
}

document.getElementById('langDeBtn')?.addEventListener('click', () => applyPlayLanguage('de'));
document.getElementById('langEnBtn')?.addEventListener('click', () => applyPlayLanguage('en'));
applyPlayLanguage(currentLang);
